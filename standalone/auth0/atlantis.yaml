  - name: staging
    dir: standalone/auth0/settings/staging
    workflow: custom
  - name: prod
    dir: standalone/auth0/settings/prod
    workflow: custom
    apply_requirements: [approved]
workflows:
  custom:
    plan:
      steps:
        - run: ../../scripts/setup-env.sh
        - init
        - plan