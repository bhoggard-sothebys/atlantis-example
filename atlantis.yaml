version: 3
projects:
  - name: dev
    dir: dev
    workflow: custom
  - name: staging
    dir: staging
    workflow: custom
  - name: prod
    dir: prod
    workflow: custom
    apply_requirements: [approved]
workflows:
  custom:
    plan:
      steps:
        - env:
            name: AUTH0_CLIENT_ID
            command: ../../../../scripts/setup-env.sh AUTH0_CLIENT_ID
        - env:
            name: AUTH0_CLIENT_SECRET
            command: ../../../../scripts/setup-env.sh AUTH0_CLIENT_SECRET
        - env:
            name: AUTH0_DOMAIN
            command: ../../../../scripts/setup-env.sh AUTH0_DOMAIN
        - run: ../../../../scripts/verify-env.sh
        - init
        - plan
    apply:
      steps:
        - run: echo "Apply is disabled. Changes must be applied manually."
