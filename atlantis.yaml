version: 3
projects:
  - name: dev
    dir: dev
    workflow: custom
  - name: staging
    dir: staging
    workflow: custom
  - name: prod
    dir: prod
    workflow: custom
    apply_requirements: [approved]
workflows:
  custom:
    plan:
      steps:
        - run: ../scripts/print-plan-dir.sh
        - init
        - plan
