version: 3
projects:
  - name: auth0-settings-dev
    dir: standalone/auth0/settings/dev
    workflow: custom
  - name: auth0-settings-staging
    dir: standalone/auth0/settings/staging
    workflow: custom
  - name: auth0-settings-prod
    dir: standalone/auth0/settings/prod
    workflow: custom
    apply_requirements: [approved]
workflows:
  custom:
    plan:
      steps:
        - env:
            name: AUTH0_CLIENT_ID
            command: ../../../../scripts/setup-env.sh AUTH0_CLIENT_ID
        - env:
            name: AUTH0_CLIENT_SECRET
            command: ../../../../scripts/setup-env.sh AUTH0_CLIENT_SECRET
        - env:
            name: AUTH0_DOMAIN
            command: ../../../../scripts/setup-env.sh AUTH0_DOMAIN
        - run: ../../../../scripts/verify-env.sh
        - init
        - plan
